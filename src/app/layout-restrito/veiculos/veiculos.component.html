<p-toast />
<p-confirmdialog styleClass="w-[500px]" >
    <ng-template  #message let-message>
        <div class="flex flex-col items-center w-full gap-4 border-b border-surface-200 dark:border-surface-700">
            <i [ngClass]="message.icon" class="!text-6xl text-primary-500"></i>
            <p>
                {{ message.message }} 
            </p>
            <textarea class="w-full" name="" id="" placeholder="Digite aqui se possui alguma observação sobre o veículo"></textarea>
        </div>
    </ng-template>
</p-confirmdialog>
<div class="main">
    
    
    @for (carro of veiculoService.veiculos(); track carro.id){
        <p-card  >
            
            <ng-template #header>
                <img alt="Card" class="w-full" src="https://primefaces.org/cdn/primeng/images/card-ng.jpg" />
            </ng-template>
            <ng-template #title> {{ carro.modelo }} </ng-template>
            <ng-template #subtitle> {{ carro.placa }} </ng-template>
            <p>
                Ano: <b>{{ carro.ano }}</b>, Cor do veiculo: <b>{{ carro.cor }}</b>
            </p>
            <ng-template #footer>
                <div class="flex gap-10 mt-1">
                    <!-- <p-button label="Cancel" severity="secondary" class="w-full" [outlined]="true" styleClass="w-full" /> -->
                    <p-button label="Selecionar" (click)="confirm(carro)" class="w-full" styleClass="w-full" />
                </div>
            </ng-template>
            
        </p-card>
        }@empty {
            <div>
                <p>Nenhum carro cadastrado.</p>
            </div>
        }
    
</div>
